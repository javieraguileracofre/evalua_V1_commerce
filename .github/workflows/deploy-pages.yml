# Publica la app web (Expo export) en GitHub Pages.
#
# Requisito (una sola vez en GitHub):
# 1) Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#    - EXPO_PUBLIC_SUPABASE_URL
#    - EXPO_PUBLIC_SUPABASE_ANON_KEY (recomendado: JWT anon eyJ... de Legacy API Keys)
#    - Opcional: EXPO_PUBLIC_SUPABASE_ANON_JWT (si existe, tiene prioridad sobre ANON_KEY)
# 2) Repo -> Settings -> Pages -> Build and deployment -> Source: Deploy from a branch
#    Branch: gh-pages / root
#
# Luego: Actions -> "Deploy web to GitHub Pages" -> Run workflow (o push a main).

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Export static web
        working-directory: app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SUPABASE_ANON_JWT: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_JWT }}
        run: npx expo export --platform web

      - name: Ensure Jekyll is disabled
        run: touch app/dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
          force_orphan: true
          cname: erp.evaluasoluciones.cl
