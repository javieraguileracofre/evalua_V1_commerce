# Publica la app web (Expo export) en GitHub Pages.
#
# Requisito (una sola vez en GitHub):
# 1) Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#    - EXPO_PUBLIC_SUPABASE_URL
#    - EXPO_PUBLIC_SUPABASE_ANON_KEY
# 2) Repo -> Settings -> Pages -> Build and deployment -> Source: GitHub Actions
#
# Luego: Actions -> "Deploy web to GitHub Pages" -> Run workflow (o push a main).

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Export static web
        working-directory: app
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Ensure Jekyll is disabled
        run: touch app/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
